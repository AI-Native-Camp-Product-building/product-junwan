services:
  aminsight:
    container_name: aminsight
    build:
      context: .
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_ADMIN_EMAIL: ${NEXT_PUBLIC_ADMIN_EMAIL}
    ports:
      - "1004:1004"
    env_file:
      - .env.local
    environment:
      - PORT=1004
      - HOSTNAME=0.0.0.0
    volumes:
      - ./credentials:/app/credentials:ro
    restart: unless-stopped

  sync-cron:
    image: alpine:3.20
    depends_on:
      - aminsight
    env_file:
      - .env.local
    entrypoint: /bin/sh
    command:
      - -c
      - |
        apk add --no-cache curl tzdata
        cp /usr/share/zoneinfo/Asia/Seoul /etc/localtime
        echo "Asia/Seoul" > /etc/timezone
        echo "0 9 * * * /scripts/sync-cron.sh >> /var/log/sync.log 2>&1" | crontab -
        crond -f -l 2
    volumes:
      - ./scripts:/scripts:ro
    restart: unless-stopped
